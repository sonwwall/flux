services:
  mysql:
    image: mysql:8.4
    container_name: flux-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: flux_root
      MYSQL_DATABASE: flux_blog
      MYSQL_USER: flux
      MYSQL_PASSWORD: flux_pass
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uflux", "-pflux_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
