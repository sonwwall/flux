services:
  mysql:
    image: mysql:8.4
    container_name: flux-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: flux_root
      MYSQL_DATABASE: flux_blog
      MYSQL_USER: flux
      MYSQL_PASSWORD: flux_pass
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uflux", "-pflux_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flux-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ADDR: 0.0.0.0:8080
      DB_DSN: flux:flux_pass@tcp(mysql:3306)/flux_blog?charset=utf8mb4&parseTime=True&loc=Local
      JWT_SECRET: flux-jwt-secret-change-me
      TZ: Asia/Shanghai
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: flux-frontend
    restart: unless-stopped
    ports:
      - "18897:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  uploads_data:
